<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Keto Switcher</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
  padding: 20px;
  -webkit-tap-highlight-color: transparent;
}
.header {
  text-align: center;
  margin-bottom: 28px;
}
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 8px;
}
.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
}
.logo h1 {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  color: #9ca3af;
  font-size: 15px;
}
.card {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid #2a2a2a;
}
.card-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.macro-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.macro-item {
  background: #0f0f0f;
  border-radius: 16px;
  padding: 20px 12px;
  text-align: center;
  border: 1px solid #2a2a2a;
}
.macro-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #6b7280;
  margin-bottom: 8px;
}
.macro-value {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 4px;
}
.macro-unit {
  font-size: 14px;
  color: #9ca3af;
}
.macro-pct {
  font-size: 14px;
  color: #6b7280;
  margin-top: 4px;
}
.cal { color: #60a5fa; }
.fat { color: #fbbf24; }
.protein { color: #f87171; }
.carbs { color: #4ade80; }
.week-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.week-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 20px;
  padding: 24px 16px;
  text-align: center;
  color: #fff;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.week-btn.active {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  border-color: transparent;
}
.week-btn:active {
  transform: scale(0.96);
}
.week-btn h3 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.week-btn p {
  font-size: 13px;
  color: #9ca3af;
}
.week-btn.active p {
  color: rgba(255,255,255,0.8);
}
.cart-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 40px;
  height: 40px;
  background: rgba(59, 130, 246, 0.9);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.meal-plan {
  display: none;
}
.meal-plan.active {
  display: block;
}
.day-card {
  background: #1a1a1a;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid #2a2a2a;
}
.day-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 12px;
  color: #60a5fa;
}
.meal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #2a2a2a;
}
.meal:last-child {
  border-bottom: none;
}
.meal-name {
  font-size: 15px;
}
.meal-cal {
  font-size: 13px;
  color: #9ca3af;
}
.back-btn {
  background: #2a2a2a;
  border: none;
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 15px;
  cursor: pointer;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn:active {
  background: #3a3a3a;
}
</style>
</head>
<body>

<div id="home">

    <div class="logo">
      <div class="logo-icon"></div>
      <h1>Keto Switcher</h1>
    </div>

  <div class="card">

      </div>

      </div>

    </div>
  </div>

  <div class="week-grid">
    <div class="week-btn active" onclick="showWeek(1)">

    </div>

      <div class="cart-btn">🛒</div>
    </div>
  </div>
</div>

<div id="week-view" style="display:none;">

function showWeek(weekNum) {
  const week = mealPlans[weekNum];
  let html = `<h2 style="margin-bottom:20px;font-size:24px;">${week.name}</h2>`;
  week.days.forEach(day => {
    html += `<div class="day-card"><div class="day-title">${day.day}</div>`;
    day.meals.forEach(meal => {
      html += `<div class="meal"><span class="meal-name">${meal.name}</span><span class="meal-cal">${meal.cal}</span></div>`;
    });
    html += `</div>`;
  });
  document.getElementById('week-content').innerHTML = html;
  document.getElementById('home').style.display = 'none';
  document.getElementById('week-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function goHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('week-view').style.display = 'none';
  window.scrollTo(0, 0);
}
